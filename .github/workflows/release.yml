name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag/release label to use for artifact names"
        required: false
        type: string
      publish_release:
        description: "Create/update GitHub Release and upload assets"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.release_tag != '' && inputs.release_tag || github.ref_name }}

jobs:
  macos:
    name: macOS app
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install system dependencies
        run: brew install mpv

      - name: Create virtualenv
        run: python -m venv .venv

      - name: Install Python dependencies
        run: .venv/bin/python -m pip install -e '.[packaging]'

      - name: Build app bundle
        run: ./scripts/build_nuitka_macos.sh

      - name: Verify packaged MPV backend
        run: |
          mkdir -p build/verify/{config,data,cache,logs}
          set +e
          QT_QPA_PLATFORM=offscreen \
          YAYMP_CONFIG_DIR="$PWD/build/verify/config" \
          YAYMP_DATA_DIR="$PWD/build/verify/data" \
          YAYMP_CACHE_DIR="$PWD/build/verify/cache" \
          YAYMP_LOG_DIR="$PWD/build/verify/logs" \
            build/nuitka/YaYmp.app/Contents/MacOS/YaYmp >build/verify/stdout.log 2>build/verify/stderr.log &
          pid=$!
          sleep 15
          kill "$pid" 2>/dev/null || true
          wait "$pid"
          status=$?
          set -e
          if [ "$status" -ne 0 ] && [ "$status" -ne 143 ]; then
            cat build/verify/stderr.log
            exit "$status"
          fi
          grep -q "Using MPV playback backend: .*build/nuitka/YaYmp.app/Contents/MacOS/lib/libmpv" build/verify/logs/yaymp.log
          ! grep -q "Falling back to fake playback backend" build/verify/logs/yaymp.log

      - name: Package app bundle
        run: |
          mkdir -p dist
          ditto -c -k --keepParent build/nuitka/YaYmp.app "dist/YAYMP-${RELEASE_TAG}-macos-arm64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: YAYMP-macos-arm64
          path: dist/YAYMP-${{ env.RELEASE_TAG }}-macos-arm64.zip

  linux:
    name: Linux AppImage
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv1 patchelf wget

      - name: Create virtualenv
        run: python -m venv .venv

      - name: Install Python dependencies
        run: .venv/bin/python -m pip install -e '.[packaging]'

      - name: Build AppDir
        run: ./scripts/build_nuitka_linux.sh

      - name: Verify packaged MPV backend
        run: |
          mkdir -p build/verify/{config,data,cache,logs}
          set +e
          QT_QPA_PLATFORM=offscreen \
          YAYMP_CONFIG_DIR="$PWD/build/verify/config" \
          YAYMP_DATA_DIR="$PWD/build/verify/data" \
          YAYMP_CACHE_DIR="$PWD/build/verify/cache" \
          YAYMP_LOG_DIR="$PWD/build/verify/logs" \
            timeout 15s build/nuitka/YaYmp.AppDir/AppRun >build/verify/stdout.log 2>build/verify/stderr.log
          status=$?
          set -e
          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then
            cat build/verify/stderr.log
            exit "$status"
          fi
          grep "Using MPV playback backend" build/verify/logs/yaymp.log
          grep -Eq "Using MPV playback backend: .*build/nuitka/YaYmp.AppDir/usr/(bin/)?lib/libmpv" build/verify/logs/yaymp.log
          ! grep -q "Falling back to fake playback backend" build/verify/logs/yaymp.log

      - name: Download appimagetool
        run: |
          mkdir -p build/tools
          wget -O build/tools/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x build/tools/appimagetool

      - name: Build AppImage
        run: |
          mkdir -p dist
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 \
            build/tools/appimagetool build/nuitka/YaYmp.AppDir "dist/YAYMP-${RELEASE_TAG}-linux-x86_64.AppImage"

      - name: Verify AppImage MPV backend
        run: |
          rm -rf build/verify-appimage
          mkdir -p build/verify-appimage/{config,data,cache,logs}
          set +e
          APPIMAGE_EXTRACT_AND_RUN=1 \
          QT_QPA_PLATFORM=offscreen \
          YAYMP_CONFIG_DIR="$PWD/build/verify-appimage/config" \
          YAYMP_DATA_DIR="$PWD/build/verify-appimage/data" \
          YAYMP_CACHE_DIR="$PWD/build/verify-appimage/cache" \
          YAYMP_LOG_DIR="$PWD/build/verify-appimage/logs" \
            timeout 15s "dist/YAYMP-${RELEASE_TAG}-linux-x86_64.AppImage" >build/verify-appimage/stdout.log 2>build/verify-appimage/stderr.log
          status=$?
          set -e
          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then
            cat build/verify-appimage/stderr.log
            exit "$status"
          fi
          grep "Using MPV playback backend" build/verify-appimage/logs/yaymp.log
          grep -Eq "Using MPV playback backend: .*libmpv" build/verify-appimage/logs/yaymp.log
          ! grep -q "Falling back to fake playback backend" build/verify-appimage/logs/yaymp.log

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: YAYMP-linux-x86_64
          path: dist/YAYMP-${{ env.RELEASE_TAG }}-linux-x86_64.AppImage

  windows:
    name: Windows portable zip
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install system dependencies
        shell: pwsh
        run: |
          choco install mpv -y --no-progress
          $dllNames = @("mpv-2.dll", "libmpv-2.dll", "libmpv.dll", "mpv.dll")
          $mpvDll = $null
          foreach ($root in @("C:\ProgramData\chocolatey\lib", "C:\Program Files", "C:\Program Files (x86)")) {
            if (-not $mpvDll -and (Test-Path $root)) {
              foreach ($dllName in $dllNames) {
                $mpvDll = Get-ChildItem -Path $root -Filter $dllName -File -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
                if ($mpvDll) {
                  break
                }
              }
            }
          }
          if (-not $mpvDll) {
            throw "Unable to locate libmpv DLL after installing mpv"
          }
          "YAYMP_MPV_LIBRARY=$mpvDll" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create virtualenv
        shell: pwsh
        run: python -m venv .venv

      - name: Install Python dependencies
        shell: pwsh
        run: .venv\Scripts\python -m pip install -e ".[packaging]"

      - name: Build Windows bundle
        shell: pwsh
        run: .\scripts\build_nuitka_windows.ps1

      - name: Verify packaged MPV backend
        shell: pwsh
        run: |
          $verifyRoot = Join-Path $pwd "build\verify-windows"
          $configDir = Join-Path $verifyRoot "config"
          $dataDir = Join-Path $verifyRoot "data"
          $cacheDir = Join-Path $verifyRoot "cache"
          $logDir = Join-Path $verifyRoot "logs"
          New-Item -ItemType Directory -Force -Path $configDir, $dataDir, $cacheDir, $logDir | Out-Null

          $env:QT_QPA_PLATFORM = "offscreen"
          $env:YAYMP_CONFIG_DIR = $configDir
          $env:YAYMP_DATA_DIR = $dataDir
          $env:YAYMP_CACHE_DIR = $cacheDir
          $env:YAYMP_LOG_DIR = $logDir

          $stdoutPath = Join-Path $verifyRoot "stdout.log"
          $stderrPath = Join-Path $verifyRoot "stderr.log"
          $process = Start-Process -FilePath "build\nuitka\YaYmp.dist\YaYmp.exe" -PassThru -RedirectStandardOutput $stdoutPath -RedirectStandardError $stderrPath
          Start-Sleep -Seconds 15

          if (-not $process.HasExited) {
            Stop-Process -Id $process.Id -Force
            $process.WaitForExit()
          } elseif ($process.ExitCode -ne 0) {
            Get-Content $stderrPath
            throw "Packaged app exited with code $($process.ExitCode)"
          }

          $logPath = Join-Path $logDir "yaymp.log"
          if (-not (Test-Path $logPath)) {
            throw "Missing packaged app log at $logPath"
          }

          Select-String -Path $logPath -Pattern "Using MPV playback backend: .*build\\\\nuitka\\\\YaYmp\.dist\\\\lib\\\\(?:lib)?mpv-2\.dll"
          if (Select-String -Path $logPath -Pattern "Falling back to fake playback backend" -Quiet) {
            throw "Packaged app fell back to fake backend"
          }

      - name: Package Windows bundle
        shell: pwsh
        run: |
          mkdir dist
          Compress-Archive -Path "build\nuitka\YaYmp.dist\*" -DestinationPath "dist\YAYMP-${env:RELEASE_TAG}-windows-x86_64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: YAYMP-windows-x86_64
          path: dist/YAYMP-${{ env.RELEASE_TAG }}-windows-x86_64.zip

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - macos
      - linux
      - windows
    if: startsWith(github.ref, 'refs/tags/') || inputs.publish_release == true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${RELEASE_TAG}" >/dev/null 2>&1 \
            || gh release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --generate-notes
          gh release upload "${RELEASE_TAG}" dist/* --clobber
