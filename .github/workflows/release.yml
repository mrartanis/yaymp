name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    name: macOS app
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: brew install mpv

      - name: Create virtualenv
        run: python -m venv .venv

      - name: Install Python dependencies
        run: .venv/bin/python -m pip install -e '.[packaging]'

      - name: Build app bundle
        run: ./scripts/build_nuitka_macos.sh

      - name: Package app bundle
        run: |
          mkdir -p dist
          ditto -c -k --keepParent build/nuitka/nuitka_entry.app "dist/YAYMP-${GITHUB_REF_NAME}-macos-arm64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: YAYMP-macos-arm64
          path: dist/YAYMP-${{ github.ref_name }}-macos-arm64.zip

  linux:
    name: Linux AppImage
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv2 patchelf wget

      - name: Create virtualenv
        run: python -m venv .venv

      - name: Install Python dependencies
        run: .venv/bin/python -m pip install -e '.[packaging]'

      - name: Build AppDir
        run: ./scripts/build_nuitka_linux.sh

      - name: Download appimagetool
        run: |
          mkdir -p build/tools
          wget -O build/tools/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x build/tools/appimagetool

      - name: Build AppImage
        run: |
          mkdir -p dist
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 \
            build/tools/appimagetool build/nuitka/YAYMP.AppDir "dist/YAYMP-${GITHUB_REF_NAME}-linux-x86_64.AppImage"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: YAYMP-linux-x86_64
          path: dist/YAYMP-${{ github.ref_name }}-linux-x86_64.AppImage

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - macos
      - linux
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 \
            || gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "YAYMP ${GITHUB_REF_NAME}"
          gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
